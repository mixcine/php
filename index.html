<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visualizador 3D Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #121116; }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #CD1C67; font-family: sans-serif;
            text-align: center; z-index: 10;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="loading">INICIANDO...</div>

<script>
    // 1. Configuração Básica
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x121116);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Otimiza bateria no mobile
    document.body.appendChild(renderer.domElement);

    // 2. Luzes (Importante para o modelo não ficar preto)
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);
    
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
    sunLight.position.set(5, 10, 5);
    scene.add(sunLight);

    // 3. Controles Touch
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 4. Carregamento
    const loader = new THREE.GLTFLoader();

    // TENTE USAR O LINK DO GITHUB PARA TESTAR SE O ARQUIVO LOCAL ESTÁ BLOQUEADO
    const url = 'https://raw.githubusercontent.com/mixcine/php/main/modelo.glb';

    loader.load(url, 
        function (gltf) {
            const model = gltf.scene;
            
            // Ajustar tamanho automaticamente
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3()).length();
            const center = box.getCenter(new THREE.Vector3());

            model.position.x += (model.position.x - center.x);
            model.position.y += (model.position.y - center.y);
            model.position.z += (model.position.z - center.z);
            
            scene.add(model);
            document.getElementById('loading').style.display = 'none';
        }, 
        function (xhr) {
            if (xhr.lengthComputable) {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                document.getElementById('loading').innerText = "CARREGANDO: " + percent + "%";
            }
        },
        function (error) {
            console.error(error);
            document.getElementById('loading').innerText = "ERRO AO CARREGAR MODELO";
        }
    );

    // 5. Loop
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // 6. Redimensionar
    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
