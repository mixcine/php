<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador GLB</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: Arial, sans-serif;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 22px;
            z-index: 100;
            text-align: center;
        }
        #info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #aaa;
            font-size: 14px;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="loading">Carregando modelo...</div>
<div id="info">Modelo GLB</div>

<script>
// Configuração da cena
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 3, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Iluminação
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 8);
scene.add(dirLight);

// Loader
const loader = new THREE.GLTFLoader();

loader.load(
    'https://raw.githubusercontent.com/mixcine/php/main/modelo.glb',   // seu arquivo

    // Sucesso
    (gltf) => {
        document.getElementById("loading").style.display = "none";
        
        const model = gltf.scene;
        scene.add(model);

        // Centraliza e ajusta automaticamente
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        model.position.set(-center.x, -box.min.y, -center.z);

        const scale = 5 / Math.max(size.x, size.y, size.z);
        model.scale.set(scale, scale, scale);

        console.log("✅ Modelo carregado com sucesso!");
    },

    // Progresso
    (xhr) => {
        if (xhr.lengthComputable) {
            const percent = Math.round((xhr.loaded / xhr.total) * 100);
            document.getElementById("loading").innerText = `Carregando... ${percent}%`;
        }
    },

    // Erro
    (error) => {
        console.error(error);
        document.getElementById("loading").innerHTML = `
            ❌ Erro ao carregar o modelo<br>
            <small>Verifique o console (F12)</small>
        `;
    }
);

// Animação
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// Responsivo
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
