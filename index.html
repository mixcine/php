<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Shadow Monarch 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #CD1C67; font-size: 20px; z-index: 10;
            text-align: center; text-transform: uppercase; letter-spacing: 2px;
        }
        #info {
            position: absolute; bottom: 20px; width: 100%;
            text-align: center; color: #555; font-size: 12px; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="loading">Iniciando sistema...</div>
<div id="info">Use o mouse para girar e o scroll para dar zoom</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // 1. Cena e Câmera
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x121116); // Seu tom de fundo padrão

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 5);

    // 2. Renderizador (Configurações de cor corrigidas)
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // 3. Iluminação Profissional
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);

    const spotLight = new THREE.SpotLight(0xffffff, 10);
    spotLight.position.set(5, 10, 5);
    scene.add(spotLight);

    // 4. Controles de Mouse
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 5. Loader do Modelo
    const loader = new GLTFLoader();
    
    // Tenta carregar localmente primeiro. Se falhar, você verá no console.
    loader.load(
        'modelo.glb', 
        (gltf) => {
            const model = gltf.scene;
            
            // Centralização Automática
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center); 
            
            scene.add(model);
            document.getElementById('loading').style.display = 'none';
            console.log("✅ Modelo carregado!");
        },
        (xhr) => {
            if (xhr.lengthComputable) {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                document.getElementById('loading').innerText = `CARREGANDO: ${percent}%`;
            }
        },
        (error) => {
            console.error("Erro no loader:", error);
            document.getElementById('loading').innerHTML = "ERRO AO CARREGAR MODELO<br><span style='font-size:12px'>Verifique se o arquivo 'modelo.glb' está na mesma pasta.</span>";
        }
    );

    // 6. Loop de Animação
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    // 7. Ajuste de Janela (Responsivo)
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
