<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D - Shadow Monarch</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #121116; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #CD1C67; font-size: 18px; z-index: 10;
            text-align: center; border: 2px solid #CD1C67;
            padding: 20px; background: rgba(0,0,0,0.8);
            border-radius: 8px;
        }
        #info {
            position: absolute; bottom: 10px; width: 100%;
            text-align: center; color: #555; font-size: 11px;
        }
    </style>
</head>
<body>

<div id="loading">AGUARDANDO ARQUIVO...</div>
<div id="info">Shadow Monarch System v1.0</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x121116);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Luzes
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(2, 5, 2);
    scene.add(light);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const loader = new GLTFLoader();

    // IMPORTANTE: O nome do arquivo abaixo DEVE ser idêntico ao que está na pasta
    const arquivoModelo = 'modelo.glb'; 

    loader.load(
        arquivoModelo, 
        (gltf) => {
            scene.add(gltf.scene);
            
            // Ajuste de escala e centralização
            const box = new THREE.Box3().setFromObject(gltf.scene);
            const center = box.getCenter(new THREE.Vector3());
            gltf.scene.position.sub(center);
            
            document.getElementById('loading').style.display = 'none';
            console.log("✅ Sucesso: O arquivo " + arquivoModelo + " foi carregado.");
        },
        (xhr) => {
            const percent = (xhr.loaded / xhr.total) * 100;
            if (percent > 0) {
                document.getElementById('loading').innerText = `CARREGANDO: ${Math.round(percent)}%`;
            }
        },
        (error) => {
            console.error("❌ Erro Detalhado:", error);
            
            let msg = "ERRO AO CARREGAR";
            if (window.location.protocol === 'file:') {
                msg = "ERRO DE SEGURANÇA:<br><small>Navegadores bloqueiam arquivos 3D abertos direto da pasta.<br>Use o <b>Live Server</b> do VS Code.</small>";
            } else {
                msg = `ARQUIVO NÃO ENCONTRADO:<br><small>Verifique se o nome <b>${arquivoModelo}</b> está correto e na mesma pasta do HTML.</small>`;
            }
            document.getElementById('loading').innerHTML = msg;
        }
    );

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
